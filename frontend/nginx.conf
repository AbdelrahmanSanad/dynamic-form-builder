server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip static assets.
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Allow multipart uploads up to 20 MB (matches backend UPLOAD_MAX_FILE_SIZE_BYTES
  # headroom; nginx default of 1 MB would block anything larger before it reaches
  # Fastify, causing a 413 / 504 that looks like a gateway timeout to the browser).
  client_max_body_size 20m;

  # Proxy API calls to the backend service (same origin -> first-party cookie).
  location /api/ {
    proxy_pass http://api:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Extend timeouts for multipart file uploads that may take a few seconds.
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # SPA fallback: serve index.html for client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
